<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#5c7a6b">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=14">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐕</text></svg>">
</head>
<body>
  <main class="page">
    <header class="hero">
      <button type="button" class="hero__photo-wrap" id="hero-photo-btn" data-i18n-aria="hero.openPhoto">
        <img src="assets/kira.jpg" alt="" class="hero__photo" id="hero-photo" width="400" height="400">
        <span class="hero__photo-hint" id="photo-hint" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </span>
      </button>
      <div class="hero__badge" data-i18n="hero.lostBadge"></div>
      <h1 class="hero__name" id="pet-name"></h1>
      <p class="hero__breed" id="pet-breed"></p>
    </header>

    <section class="card" id="info-section">
      <h2 class="card__title" data-i18n="sections.about"></h2>
      <dl class="info-list" id="info-list"></dl>
      <ul class="notes" id="notes-list"></ul>
    </section>

    <section class="card card--urgent">
      <h2 class="card__title" data-i18n="sections.help"></h2>
      <p class="card__text" data-i18n="help.text"></p>
    </section>

    <section class="card" id="owners-section">
      <h2 class="card__title" data-i18n="sections.contacts"></h2>
      <div class="owners" id="owners-list"></div>
      <label class="location-toggle">
        <input type="checkbox" id="include-location" class="location-toggle__input">
        <span class="location-toggle__text" data-i18n="contacts.includeLocation"></span>
      </label>
      <p class="location__status hidden" id="location-status"></p>
      <a class="location__map-link hidden" id="location-map-link" href="#" data-i18n="contacts.openMap"></a>
    </section>

    <section class="card" id="fallback-section">
      <h2 class="card__title" data-i18n="sections.fallback"></h2>
      <p class="fallback__text" id="fallback-note"></p>
      <p class="fallback__clinic">
        <strong id="fallback-name"></strong><br>
        <button type="button" class="fallback__address" id="fallback-address"></button>
      </p>
      <details class="backup-spoiler" id="backup-section">
        <summary class="backup-spoiler__summary" data-i18n="backup.toggle"></summary>
        <div class="owners" id="backup-list"></div>
      </details>
    </section>

    <footer class="footer">
      <p data-i18n="footer.thanks"></p>
    </footer>
  </main>

  <div class="carousel hidden" id="carousel" role="dialog" aria-modal="true" data-i18n-aria="carousel.title">
    <button type="button" class="carousel__close" id="carousel-close" data-i18n-aria="carousel.close">&times;</button>
    <div class="carousel__viewport" id="carousel-viewport">
      <div class="carousel__track" id="carousel-track"></div>
    </div>
    <button type="button" class="carousel__nav carousel__nav--prev" id="carousel-prev" data-i18n-aria="carousel.prev">&lsaquo;</button>
    <button type="button" class="carousel__nav carousel__nav--next" id="carousel-next" data-i18n-aria="carousel.next">&rsaquo;</button>
    <div class="carousel__counter" id="carousel-counter"></div>
    <div class="carousel__dots" id="carousel-dots"></div>
  </div>

  <div class="map-sheet hidden" id="map-sheet" role="dialog" aria-modal="true" data-i18n-aria="maps.title">
    <div class="map-sheet__panel">
      <h2 class="map-sheet__title" data-i18n="maps.title"></h2>
      <p class="map-sheet__target" id="map-sheet-target"></p>
      <div class="map-sheet__actions" id="map-sheet-actions"></div>
      <button type="button" class="map-sheet__close" id="map-sheet-close" data-i18n="maps.cancel"></button>
    </div>
  </div>

  <script src="locale.ru.js?v=14"></script>
  <script src="config.js?v=14"></script>
  <script src="app.js?v=14"></script>
</body>
</html>
