name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from secret
        env:
          PET_CONFIG_JSON: ${{ secrets.PET_CONFIG_JSON }}
        run: |
          if [ -z "$PET_CONFIG_JSON" ]; then
            echo "PET_CONFIG_JSON secret is not set in repository settings" >&2
            exit 1
          fi
          printf 'const PET_CONFIG = %s;\n' "$PET_CONFIG_JSON" > config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
